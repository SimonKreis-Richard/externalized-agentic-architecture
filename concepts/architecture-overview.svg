<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ah-green" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#3fb950"/></marker>
    <marker id="ah-blue" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#58a6ff"/></marker>
    <marker id="ah-teal" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#39c5cf"/></marker>
    <marker id="ah-mut" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8b949e"/></marker>
  </defs>

  <rect x="0" y="0" width="1000" height="720" fill="#0d1117"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#3fb950" font-size="23" font-weight="700">The Bounded Agent — Architecture</text>
  <text x="500" y="63" text-anchor="middle" fill="#8b949e" font-size="13">Curate what enters the attention budget at each step</text>

  <!-- Ariadne's Thread spine -->
  <line x1="40" y1="92" x2="40" y2="600" stroke="#39c5cf" stroke-width="2" stroke-dasharray="3 5" opacity="0.8"/>
  <text x="28" y="350" text-anchor="middle" fill="#39c5cf" font-size="12" font-weight="600" transform="rotate(-90 28 350)">Ariadne's Thread · every step leaves a trace</text>

  <!-- Human -->
  <rect x="360" y="86" width="280" height="50" rx="9" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="500" y="108" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Human</text>
  <text x="500" y="125" text-anchor="middle" fill="#8b949e" font-size="11">steers · articulates · decides</text>

  <!-- Reflective mirror arrow -->
  <line x1="500" y1="136" x2="500" y2="174" stroke="#bc8cff" stroke-width="2" marker-end="url(#ah-blue)" marker-start="url(#ah-blue)"/>
  <text x="516" y="151" fill="#bc8cff" font-size="11" font-weight="600">Reflective Mirror</text>
  <text x="516" y="165" fill="#8b949e" font-size="10">articulate ⇄ challenge</text>

  <!-- Context window -->
  <rect x="210" y="178" width="560" height="212" rx="11" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="490" y="201" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">CONTEXT WINDOW — the finite attention budget</text>

  <rect x="226" y="214" width="160" height="88" rx="7" fill="#1c2128" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="306" y="240" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">Core identity</text>
  <text x="306" y="259" text-anchor="middle" fill="#8b949e" font-size="10.5">always loaded · tiny</text>
  <text x="306" y="288" text-anchor="middle" fill="#58a6ff" font-size="10">Pointer Identity</text>

  <rect x="402" y="214" width="160" height="88" rx="7" fill="#1c2128" stroke="#d29922" stroke-width="1.2"/>
  <text x="482" y="240" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">Loaded skill</text>
  <text x="482" y="259" text-anchor="middle" fill="#8b949e" font-size="10.5">on demand</text>
  <text x="482" y="288" text-anchor="middle" fill="#d29922" font-size="10">Progressive Disclosure</text>

  <rect x="578" y="214" width="176" height="88" rx="7" fill="#1c2128" stroke="#bc8cff" stroke-width="1.2"/>
  <text x="666" y="240" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">Working memory</text>
  <text x="666" y="259" text-anchor="middle" fill="#8b949e" font-size="10.5">capped</text>
  <text x="666" y="288" text-anchor="middle" fill="#bc8cff" font-size="10">Externalized Memory</text>

  <rect x="226" y="314" width="528" height="60" rx="7" fill="#10151c" stroke="#30363d" stroke-width="1"/>
  <text x="490" y="340" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Active reasoning · scratch</text>
  <text x="490" y="358" text-anchor="middle" fill="#8b949e" font-size="10.5">everything that isn't being reasoned about lives outside</text>

  <!-- Sub-agents -->
  <rect x="802" y="210" width="178" height="124" rx="9" fill="#1c2128" stroke="#39c5cf" stroke-width="1.5"/>
  <text x="891" y="236" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Sub-agents</text>
  <text x="891" y="254" text-anchor="middle" fill="#8b949e" font-size="10.5">clean context windows</text>
  <text x="891" y="320" text-anchor="middle" fill="#39c5cf" font-size="10">Orchestrated Routing ·</text>
  <text x="891" y="332" text-anchor="middle" fill="#39c5cf" font-size="10">Dynamic Delegation</text>
  <line x1="770" y1="244" x2="800" y2="244" stroke="#8b949e" stroke-width="1.6" marker-end="url(#ah-mut)"/>
  <text x="785" y="237" text-anchor="middle" fill="#8b949e" font-size="9.5">delegate</text>
  <line x1="800" y1="284" x2="770" y2="284" stroke="#39c5cf" stroke-width="1.6" marker-end="url(#ah-teal)"/>
  <text x="785" y="300" text-anchor="middle" fill="#39c5cf" font-size="9.5">distilled summary</text>

  <!-- Load / externalize arrows -->
  <line x1="360" y1="430" x2="360" y2="392" stroke="#3fb950" stroke-width="2" marker-end="url(#ah-green)"/>
  <text x="352" y="414" text-anchor="end" fill="#3fb950" font-size="11" font-weight="600">just-in-time load</text>
  <line x1="620" y1="392" x2="620" y2="430" stroke="#58a6ff" stroke-width="2" marker-end="url(#ah-blue)"/>
  <text x="630" y="414" fill="#58a6ff" font-size="11" font-weight="600">externalize</text>

  <!-- Durable -->
  <rect x="210" y="432" width="368" height="152" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <text x="232" y="457" fill="#e6edf3" font-size="13" font-weight="700">DURABLE</text>
  <text x="318" y="457" fill="#8b949e" font-size="11">— load on demand</text>
  <text x="232" y="484" fill="#c9d1d9" font-size="12">• Skills — procedures</text>
  <text x="232" y="507" fill="#c9d1d9" font-size="12">• Memory tiers — facts</text>
  <text x="232" y="530" fill="#c9d1d9" font-size="12">• Project context</text>
  <text x="232" y="553" fill="#c9d1d9" font-size="12">• Config</text>
  <text x="232" y="574" fill="#3fb950" font-size="10">Context Recycling promotes here →</text>

  <!-- Archive -->
  <rect x="600" y="432" width="380" height="152" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <text x="622" y="457" fill="#e6edf3" font-size="13" font-weight="700">ARCHIVE</text>
  <text x="708" y="457" fill="#8b949e" font-size="11">— append-only · searched on demand</text>
  <text x="622" y="484" fill="#c9d1d9" font-size="12">• Session logs</text>
  <text x="622" y="507" fill="#c9d1d9" font-size="12">• Learnings</text>
  <text x="622" y="530" fill="#c9d1d9" font-size="12">• Idea backlog</text>
  <text x="622" y="566" fill="#8b949e" font-size="10.5">the extended mind — survives any single session</text>

  <!-- Cycle + platform note -->
  <text x="500" y="624" text-anchor="middle" fill="#8b949e" font-size="11.5">Cycle:  Archive → Durable (capture / promote) → Context (load / reason) → Durable (externalize) → Archive</text>
  <text x="500" y="648" text-anchor="middle" fill="#6e7681" font-size="11">Increasingly platform-native: compaction · file-memory · portable skills format</text>
</svg>
