# Hermes Agent Configuration — Template
# =============================================================================
# This is a TEMPLATE. All [PLACEHOLDER] values must be filled in before use.
# Copy to ~/.hermes/config.yaml and customize.
# Secrets (API keys) go in ~/.hermes/.env, never in this file.
#
# Design philosophy: "Only set what needs to change. Everything else uses Hermes
# defaults." See MANIFESTO.md for principles, ARCHITECTURE.md for rationale.
# =============================================================================

# =============================================================================
# MODEL — Provider and model selection
# =============================================================================
# Uses {VAR} notation so values resolve from vars.md at runtime.
# Never hardcode model names or providers here.
# =============================================================================

model:
  # Primary model: {PRO_MODEL}
  # Recommended: MoE (Mixture of Experts) architecture for best cost/performance.
  # Rationale: Fewer active parameters per query = cheaper tokens without
  #   proportional quality loss. See Architecture §6 — Model Selection via Benchmarks.
  # default: "{PRO_MODEL}"

  # Inference provider: {PROVIDER}
  # Rationale: Single API gateway to all major model providers. ~5% credit fee,
  #   0% token markup. Rapid switching without reconfiguration.
  # Pillars: Portability.
  # See: Architecture §6 — OpenRouter as Sole Inference Provider.
  provider: "openrouter"

  # API endpoint: OpenRouter's chat completions endpoint.
  # Rationale: Universal compatibility. Same endpoint serves all models.
  base_url: "https://openrouter.ai/api/v1"

  # API mode: Chat completions (OpenAI-compatible).
  # Rationale: Standard protocol. All providers behind OpenRouter support it.
  api_mode: "chat_completions"

# =============================================================================
# AGENT — Reasoning effort, verbosity
# =============================================================================
# Pillar: Explicit Control. The agent does not guess. It does not elaborate
#   unsolicited. It answers and waits.
# Pillar: Token Discipline. reasoning_effort=low is the sweet spot.
# =============================================================================

agent:
  # Reasoning effort: LOW (sweet spot).
  # Rationale: Low reasoning captures ~80% of none→high quality gain at minimal
  #   overhead. Max reasoning is wasteful — performance scales linearly while
  #   cost scales exponentially.
  reasoning_effort: "low"

  # Verbose mode: OFF.
  # Rationale: Extreme semantic density is a permanent behavioral reflex
  #   (encoded in SOUL.md). Verbose output from scaffolding conflicts with
  #   token discipline. No unsolicited commentary. No filler.
  verbose: false

# =============================================================================
# TERMINAL — Local installation, no Docker, no SSH
# =============================================================================
# Pillar: Single Source of Truth. Local filesystem = direct access to all
#   user data. No network latency. No credential overhead.
# =============================================================================

terminal:
  # Backend: LOCAL.
  # Rationale: Direct filesystem access. No Docker overhead. No SSH latency.
  # Security enforced through scope rules in SOUL.md (read everywhere,
  #   write only to a single dedicated output directory).
  backend: "local"

  # Timeout: 180 seconds (Hermes default).
  # Sufficient for complex multi-step operations.
  timeout: 180

  # Working directory: auto-detected (Hermes default).
  # No manual override needed. Pillar: Radical Simplicity — don't set
  #   what you don't need to change.

# =============================================================================
# MEMORY — Disabled by Design
# =============================================================================
# Memory is disabled. Compaction captures low-importance data and wastes
# context window tokens. External memory providers add latency (network
# round-trips) and reduce portability (API dependencies, provider lock-in).
#
# Critical info is externalized to:
#   - SOUL.md (pointer architecture, ~800-1200 tokens)
#   - data/*.json (structured user data, zero-latency, fully portable, version-controlled)
#   - GitHub (backup and versioning for the entire architecture)
#
# This provides manual, granular control over what persists with no external dependencies.
# memory_enabled: false
# user_profile_enabled: false

# =============================================================================
# SKILLS — 3 core always loaded + curated custom directory
# =============================================================================
# Pillar: Radical Simplicity. Skills are a tax on focus.
#   Each loaded skill costs tokens and cognitive overhead.
# Pillar: Explicit Control. Core skills are always loaded.
#   Additional skills loaded on demand from curated custom directory.
# =============================================================================

# 3 core skills always loaded: hermes-agent, soul-management, verification.
# Custom skills use 0- prefix convention for curated directory.
# When a skill is needed beyond core, cast it explicitly from the custom directory.
# Maximum active at any time: 5-8.
# See: ARCHITECTURE.md — Skill Philosophy.

# =============================================================================
# DELEGATION — Sub-agent orchestration
# =============================================================================
# Controls how the orchestrator spawns and manages sub-agents.
# =============================================================================

delegation:
  # Max concurrent sub-agents. 3 is optimal for most workflows.
  max_concurrent_children: 3

  # Max spawn depth. 2 suffices for 95% of tasks. 3 is the hard cap.
  max_spawn_depth: 3

  # Orchestrator role enabled. Set false to disable nested delegation.
  orchestrator_enabled: true

# =============================================================================
# MCP TOOLS — Model Context Protocol integrations
# =============================================================================
# Tool pipeline: Tavily (research) → Exa (deep search) → Jina (read/extract).
# Each requires an API key in ~/.hermes/.env.
# =============================================================================

mcp:
  # Tavily — Web search, crawl, extract, research.
  # Use: General-purpose web research, news, facts.
  tavily:
    enabled: true
    # API key from environment: TAVILY_API_KEY

  # Exa — Semantic search, neural retrieval.
  # Use: Deep topic research, finding specific content by meaning.
  exa:
    enabled: true
    # API key from environment: EXA_API_KEY

  # Jina — Web reading, extraction, classification, dedup.
  # Use: Clean content extraction from URLs, PDF processing, embeddings.
  jina:
    enabled: true
    # API key from environment: JINA_API_KEY

# =============================================================================
# TTS — Text-to-Speech (optional)
# =============================================================================
# Enable if voice output is needed. Provider placeholder — configure per setup.
# =============================================================================

tts:
  enabled: false
  # provider: "{TTS_PROVIDER}"
  # voice: "{TTS_VOICE}"

# =============================================================================
# CURATOR — Skill curation automation (disabled by design)
# =============================================================================
# Manual curation is preferred over automated skill management.
# The agent curates skills explicitly via the SOUL reflexes.
# =============================================================================

curator:
  enabled: false

# =============================================================================
# SECURITY — Enabled, minimal configuration
# =============================================================================
# Pillar: Simplicity. Tirith is a lightweight built-in scanner.
#   No external dependencies. No configuration overhead.
# =============================================================================

security:
  tirith_enabled: true

# =============================================================================
# EVERYTHING ELSE — Hermes defaults. No overrides.
# =============================================================================
# The following settings are intentionally NOT configured here because
# Hermes provides reasonable defaults for all of them:
#
#   compression.enabled — Hermes auto-manages context window saturation.
#   tool_loop_guardrails — Default thresholds are sufficient.
#   credential_pool — Not needed for single-user local installation.
#   max_iterations — Hermes default.
#   context_length — Auto-detected from provider.
#   max_tokens — Auto-detected from model's native ceiling.
#   provider_routing — OpenRouter defaults are optimal.
#   browser — Not used in this architecture.
#   Gateway platforms — Not used in this architecture (CLI-only agent).
#
# Manifesto Pillar 1 (Radical Simplicity): "Only set what needs to change."
# Every omitted setting is a deliberate act of architectural discipline.
# =============================================================================
